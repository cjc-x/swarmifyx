appId: ai.chopsticks.desktop
productName: Chopsticks
artifactName: "Chopsticks-${version}-${arch}.${ext}"
asar: false

directories:
  app: .stage/app
  output: release
  buildResources: assets

files:
  - "package.json"
  - "dist/**/*"

extraResources:
  - from: .stage/app/node_modules
    to: app-runtime/node_modules
    filter:
      - "**/*"

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
