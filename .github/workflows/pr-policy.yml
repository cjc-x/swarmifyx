name: PR Policy

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Block manual lockfile edits
        if: github.head_ref != 'chore/refresh-lockfile'
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          if printf '%s\n' "$changed" | grep -qx 'pnpm-lock.yaml'; then
            lock_lines="$(git diff --unified=0 "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- pnpm-lock.yaml | grep -E '^[+-]' | grep -vE '^(---|\\+\\+\\+)')"
            allow_approved_fix=true
            while IFS= read -r line; do
              case "$line" in
                "") ;;
                "-  '@abacus-lab/adapter-utils@0.3.1':" | \
                "+  '@paperclipai/adapter-utils@0.3.1':" | \
                "-  '@abacus-lab/adapter-utils@0.3.1': {}" | \
                "+  '@paperclipai/adapter-utils@0.3.1': {}" | \
                "-      '@abacus-lab/adapter-utils': 0.3.1" | \
                "+      '@paperclipai/adapter-utils': 0.3.1") ;;
                *)
                  allow_approved_fix=false
                  echo "Unexpected pnpm-lock.yaml change: $line"
                  ;;
              esac
            done <<EOF
$lock_lines
EOF

            if [ "$allow_approved_fix" = true ]; then
              echo "Allowing approved hermes-paperclip-adapter lockfile namespace correction."
            else
              echo "Do not commit pnpm-lock.yaml in pull requests. CI owns lockfile updates."
              exit 1
            fi
          fi

      - name: Validate dependency resolution when manifests change
        run: |
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          manifest_pattern='(^|/)package\.json$|^pnpm-workspace\.yaml$|^\.npmrc$|^pnpmfile\.(cjs|js|mjs)$'
          if printf '%s\n' "$changed" | grep -Eq "$manifest_pattern"; then
            pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile
          fi
