services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: papertape
      POSTGRES_PASSWORD: papertape
      POSTGRES_DB: papertape
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papertape -d papertape"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://papertape:papertape@db:5432/papertape
      PORT: "3100"
      SERVE_UI: "true"
      PAPERTAPE_DEPLOYMENT_MODE: "authenticated"
      PAPERTAPE_DEPLOYMENT_EXPOSURE: "private"
      PAPERTAPE_PUBLIC_URL: "${PAPERTAPE_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - papertape-data:/papertape
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  papertape-data:
